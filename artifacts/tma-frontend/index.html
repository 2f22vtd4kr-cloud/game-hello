<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover: content extends under notch/home indicator on iOS.
      user-scalable=no: prevents unintentional zoom inside the mini app.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050507" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Топливный Узел</title>

    <!-- Fonts (best-effort; falls back to system-ui if offline) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!--
      ⚠️  Leaflet CSS is NOT loaded from a CDN here.
      It is imported in src/main.tsx so Vite bundles it alongside the JS.
      CDN resources are unreliable in Telegram WebView (CSP, offline, etc.)
      and caused the "Произошла системная ошибка" crash.
    -->

    <!--
      Telegram Mini App SDK — must run BEFORE React so that
      window.Telegram.WebApp is available during first render.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
